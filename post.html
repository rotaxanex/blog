<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yazı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathOnLoad()"></script>
  <style>
    :root {
      --bg: #f8f6f2; --card: #ffffff; --muted: #f0ece5; --border: #e4dbd0;
      --text: #1c1a17; --text-sec: #5a5049; --text-mut: #9e9187;
      --accent: #2b57e0; --accent-muted: #eaeffc;
    }
    .dark {
      --bg: #0f0e0c; --card: #181714; --muted: #201e1b; --border: #2c2924;
      --text: #f2efe9; --text-sec: #b3a99e; --text-mut: #655e56;
      --accent: #607df2; --accent-muted: #192040;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Sora', sans-serif; }
    a { text-decoration: none; color: inherit; }

    nav { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .nav-inner { max-width: 720px; margin: 0 auto; padding: 0 1.25rem; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 700; color: var(--text); }
    .btn-back { font-size: .82rem; color: var(--text-mut); cursor: pointer; display: flex; align-items: center; gap: .3rem; background: none; border: none; }
    .btn-back:hover { color: var(--accent); }
    .btn-theme { background: var(--muted); border: none; border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: .85rem; color: var(--text-mut); }

    .container { max-width: 720px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

    /* POST HEADER */
    .badge { display: inline-block; font-size: .72rem; font-weight: 600; padding: 3px 10px; border-radius: 999px; margin-bottom: .75rem; }
    .post-title { font-family: 'Lora', serif; font-size: 2rem; font-weight: 700; line-height: 1.3; color: var(--text); margin-bottom: .75rem; }
    .post-excerpt { font-size: 1.05rem; color: var(--text-sec); line-height: 1.7; margin-bottom: 1.25rem; }
    .post-meta { display: flex; gap: 1rem; font-size: .8rem; color: var(--text-mut); padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; flex-wrap: wrap; }
    .cover-img { width: 100%; max-height: 360px; object-fit: cover; border-radius: 12px; margin-bottom: 2rem; }

    /* CONTENT */
    .post-content { font-family: 'Lora', serif; font-size: 1.1rem; line-height: 1.85; color: var(--text-sec); }
    .post-content p { margin-bottom: 1.25rem; }
    .post-content h2 { font-family: 'Lora', serif; font-size: 1.4rem; font-weight: 700; color: var(--text); margin: 2rem 0 .75rem; }
    .post-content h3 { font-family: 'Lora', serif; font-size: 1.15rem; font-weight: 600; color: var(--text); margin: 1.5rem 0 .5rem; }
    .post-content blockquote { border-left: 3px solid var(--accent); padding-left: 1.25rem; margin: 1.5rem 0; font-style: italic; color: var(--text-sec); }
    .post-content code { background: var(--muted); padding: .15em .4em; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: .85em; }
    .post-content pre { background: #0f1117; border-radius: 10px; padding: 1.25rem; margin: 1.5rem 0; overflow-x: auto; }
    .post-content pre code { background: transparent; color: #e2e8f0; font-size: .88rem; line-height: 1.7; }
    .post-content img { max-width: 100%; border-radius: 10px; margin: 1.5rem auto; display: block; }
    .post-content ul, .post-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    .post-content li { margin-bottom: .3rem; }
    .post-content a { color: var(--accent); text-decoration: underline; }

    /* TAGS */
    .tags { display: flex; flex-wrap: wrap; gap: .4rem; margin: 2rem 0; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .tag { background: var(--muted); color: var(--text-mut); font-size: .72rem; padding: 3px 10px; border-radius: 999px; }

    /* ADMIN ACTIONS */
    .admin-bar { display: flex; gap: .5rem; margin-bottom: 1.5rem; padding: .75rem 1rem; background: var(--accent-muted); border-radius: 10px; border: 1px solid var(--accent); }
    .admin-bar a, .admin-bar button { font-size: .82rem; color: var(--accent); background: none; border: none; cursor: pointer; font-weight: 600; }
    .admin-bar a:hover, .admin-bar button:hover { opacity: .7; }

    /* COMMENTS */
    .comments-section { margin-top: 2.5rem; }
    .comments-section h2 { font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; }
    .comment-form { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 1.25rem; }
    .comment-form p { font-size: .82rem; color: var(--text-mut); margin-bottom: .5rem; }
    .comment-form textarea { width: 100%; background: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: .75rem; font-size: .9rem; color: var(--text); resize: none; outline: none; font-family: 'Sora', sans-serif; }
    .comment-form textarea:focus { border-color: var(--accent); }
    .btn-send { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: .5rem 1.1rem; font-size: .85rem; font-weight: 600; cursor: pointer; margin-top: .5rem; float: right; }
    .btn-send:disabled { opacity: .4; cursor: not-allowed; }
    .login-prompt { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; text-align: center; margin-bottom: 1.25rem; }
    .login-prompt p { font-size: .88rem; color: var(--text-sec); margin-bottom: .75rem; }
    .btn-login { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: .5rem 1.25rem; font-size: .85rem; font-weight: 600; cursor: pointer; }
    .comment-list { display: flex; flex-direction: column; gap: .75rem; }
    .comment-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; display: flex; gap: .75rem; }
    .comment-card.reply { margin-left: 2.5rem; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .85rem; font-weight: 700; flex-shrink: 0; background: var(--accent); color: #fff; }
    .avatar.other { background: var(--muted); color: var(--text-sec); }
    .comment-body { flex: 1; }
    .comment-header { display: flex; justify-content: space-between; margin-bottom: .25rem; }
    .comment-name { font-size: .85rem; font-weight: 600; color: var(--text); }
    .author-tag { font-size: .68rem; background: var(--accent-muted); color: var(--accent); padding: 1px 6px; border-radius: 999px; margin-left: .3rem; }
    .comment-date { font-size: .72rem; color: var(--text-mut); }
    .comment-text { font-size: .88rem; color: var(--text-sec); line-height: 1.6; }
    .comment-actions { display: flex; gap: 1rem; margin-top: .4rem; }
    .comment-actions button { background: none; border: none; font-size: .75rem; color: var(--text-mut); cursor: pointer; }
    .comment-actions button:hover { color: var(--accent); }
    .reply-form { margin-top: .5rem; }
    .reply-form textarea { width: 100%; background: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: .6rem; font-size: .85rem; color: var(--text); resize: none; outline: none; font-family: 'Sora', sans-serif; }
    .reply-btns { display: flex; gap: .5rem; justify-content: flex-end; margin-top: .4rem; }
    .btn-cancel { background: none; border: none; font-size: .78rem; color: var(--text-mut); cursor: pointer; }
    .btn-reply { background: var(--accent); color: #fff; border: none; border-radius: 7px; padding: 4px 12px; font-size: .78rem; font-weight: 600; cursor: pointer; }

    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 3rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .clearfix::after { content: ''; display: block; clear: both; }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <button class="btn-back" onclick="history.back()">← Geri</button>
    <a href="index.html" class="logo">✦ Blog</a>
    <button class="btn-theme" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="container">
  <div id="postContent"><div class="spinner"></div></div>
  <div id="commentsSection"></div>
</div>

<script>
  const SUPABASE_URL = 'https://umuiojigaasxaanxbiil.supabase.co'
  const SUPABASE_ANON_KEY = 'sb_publishable_1TLYJD-tBtAFjPw9l6EktQ_XqQ42TzV'
  const ADMIN_USER_ID = '9cc50286-6229-4b2b-a3e6-883a812f2390'

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  let categories = []
  async function loadCategories() {
    const { data } = await sb.from('categories').select('*').order('created_at')
    categories = data || []
  }
  const params = new URLSearchParams(location.search)
  const postId = params.get('id')
  let currentUser = null
  let currentPost = null
  let mathReady = false

  // Theme
  const saved = localStorage.getItem('theme')
  if (saved === 'dark') { document.documentElement.classList.add('dark'); document.getElementById('themeBtn').textContent = '☀️' }
  function toggleTheme() {
    const dark = document.documentElement.classList.toggle('dark')
    localStorage.setItem('theme', dark ? 'dark' : 'light')
    document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙'
  }

  function renderMathOnLoad() {
    mathReady = true
    tryRenderMath()
  }

  function tryRenderMath() {
    if (!mathReady) return
    const el = document.querySelector('.post-content')
    if (!el) return
    renderMathInElement(el, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\[', right: '\\]', display: true },
        { left: '\\(', right: '\\)', display: false },
      ],
      throwOnError: false
    })
  }

  function formatDate(d) {
    if (!d) return ''
    return new Date(d).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' })
  }

  async function init() {
    if (!postId) { document.getElementById('postContent').innerHTML = '<p style="text-align:center;color:var(--text-mut);padding:3rem">Yazı bulunamadı.</p>'; return }

    const { data: { session } } = await sb.auth.getSession()
    currentUser = session?.user || null

    await loadCategories()
    const { data: post } = await sb.from('posts').select('*').eq('id', postId).single()
    if (!post) { document.getElementById('postContent').innerHTML = '<p style="text-align:center;color:var(--text-mut);padding:3rem">Yazı bulunamadı.</p>'; return }

    currentPost = post
    document.title = post.title + ' | Blog'

    // Increment view
    sb.from('posts').update({ view_count: (post.view_count || 0) + 1 }).eq('id', postId).then(() => {})

    const cat = categories.find(c => c.slug === post.category)

    const isAdmin = currentUser?.id === ADMIN_USER_ID
    const adminBar = isAdmin ? `
      <div class="admin-bar">
        <span>⚙ Admin:</span>
        <a href="admin.html?edit=${postId}">✏ Düzenle</a>
        <button onclick="deletePost()">🗑 Sil</button>
        <button onclick="toggleFeatured(${post.featured})">${post.featured ? '★ Öne çıkandan kaldır' : '☆ Öne çıkar'}</button>
      </div>` : ''

    document.getElementById('postContent').innerHTML = `
      ${adminBar}
      ${cat ? `<span class="badge" style="background:${cat.color}20;color:${cat.color}">${cat.name}</span>` : ''}
      <h1 class="post-title">${post.title}</h1>
      ${post.excerpt ? `<p class="post-excerpt">${post.excerpt}</p>` : ''}
      <div class="post-meta">
        <span>${formatDate(post.published_at)}</span>
        <span>· ${post.read_time || 5} dk okuma</span>
        <span>· ${post.view_count || 0} görüntüleme</span>
      </div>
      ${post.cover_image ? `<img class="cover-img" src="${post.cover_image}" alt="${post.title}" />` : ''}
      <div class="post-content">${post.content || ''}</div>
      ${post.tags?.length ? `<div class="tags">${post.tags.map(t => `<span class="tag"># ${t}</span>`).join('')}</div>` : ''}
    `

    tryRenderMath()
    loadComments()
  }

  async function deletePost() {
    if (!confirm('Bu yazıyı silmek istediğinizden emin misiniz?')) return
    await sb.from('posts').delete().eq('id', postId)
    window.location.href = 'index.html'
  }

  async function toggleFeatured(current) {
    await sb.from('posts').update({ featured: !current }).eq('id', postId)
    location.reload()
  }

  // ── COMMENTS ────────────────────────────────────────────
  async function loadComments() {
    const { data: comments } = await sb.from('comments')
      .select('*, profiles(full_name, username)')
      .eq('post_id', postId)
      .is('parent_id', null)
      .eq('is_approved', true)
      .order('created_at', { ascending: true })

    const allComments = comments || []

    // fetch replies
    const withReplies = await Promise.all(allComments.map(async c => {
      const { data: replies } = await sb.from('comments')
        .select('*, profiles(full_name, username)')
        .eq('parent_id', c.id)
        .eq('is_approved', true)
        .order('created_at', { ascending: true })
      return { ...c, replies: replies || [] }
    }))

    renderComments(withReplies)
  }

  function renderComments(comments) {
    const total = comments.reduce((a, c) => a + 1 + c.replies.length, 0)
    const isLoggedIn = !!currentUser

    const formHtml = isLoggedIn ? `
      <div class="comment-form">
        <p>${currentUser.email?.split('@')[0]} olarak yorum yapıyorsunuz</p>
        <textarea id="newComment" rows="3" placeholder="Düşüncelerinizi yazın..."></textarea>
        <div class="clearfix">
          <button class="btn-send" onclick="submitComment()">Gönder</button>
        </div>
      </div>` : `
      <div class="login-prompt">
        <p>Yorum yazmak için giriş yapmanız gerekiyor.</p>
        <button class="btn-login" onclick="window.location='admin.html'">Giriş Yap / Kayıt Ol</button>
      </div>`

    const commentsHtml = comments.length === 0
      ? '<p style="text-align:center;color:var(--text-mut);padding:2rem;font-family:Lora,serif">Henüz yorum yok. İlk yorumu siz yapın!</p>'
      : `<div class="comment-list">
          ${comments.map(c => commentCardHtml(c) + c.replies.map(r => commentCardHtml(r, true)).join('')).join('')}
        </div>`

    document.getElementById('commentsSection').innerHTML = `
      <div class="comments-section">
        <h2>💬 Yorumlar (${total})</h2>
        ${formHtml}
        ${commentsHtml}
      </div>`
  }

  function commentCardHtml(c, isReply = false) {
    const name = c.profiles?.full_name || c.profiles?.username || 'Anonim'
    const isAuthor = c.author_id === ADMIN_USER_ID
    const isOwn = currentUser?.id === c.author_id
    const date = new Date(c.created_at).toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' })
    return `
      <div class="comment-card ${isReply ? 'reply' : ''}" id="comment-${c.id}">
        <div class="avatar ${isAuthor ? '' : 'other'}">${name.charAt(0).toUpperCase()}</div>
        <div class="comment-body">
          <div class="comment-header">
            <span class="comment-name">${name}${isAuthor ? '<span class="author-tag">Yazar</span>' : ''}</span>
            <span class="comment-date">${date}</span>
          </div>
          <p class="comment-text">${c.content}</p>
          <div class="comment-actions">
            ${!isReply && currentUser ? `<button onclick="toggleReply('${c.id}')">↩ Yanıtla</button>` : ''}
            ${isOwn ? `<button onclick="deleteComment('${c.id}')">🗑 Sil</button>` : ''}
          </div>
          <div id="replyForm-${c.id}"></div>
        </div>
      </div>`
  }

  function toggleReply(commentId) {
    const el = document.getElementById(`replyForm-${commentId}`)
    if (el.innerHTML) { el.innerHTML = ''; return }
    el.innerHTML = `
      <div class="reply-form">
        <textarea id="replyText-${commentId}" rows="2" placeholder="Yanıtınızı yazın..."></textarea>
        <div class="reply-btns">
          <button class="btn-cancel" onclick="document.getElementById('replyForm-${commentId}').innerHTML=''">İptal</button>
          <button class="btn-reply" onclick="submitReply('${commentId}')">Yanıtla</button>
        </div>
      </div>`
  }

  async function submitComment() {
    const text = document.getElementById('newComment').value.trim()
    if (!text || !currentUser) return
    await sb.from('comments').insert({ post_id: postId, author_id: currentUser.id, content: text })
    loadComments()
  }

  async function submitReply(parentId) {
    const text = document.getElementById(`replyText-${parentId}`)?.value.trim()
    if (!text || !currentUser) return
    await sb.from('comments').insert({ post_id: postId, author_id: currentUser.id, content: text, parent_id: parentId })
    loadComments()
  }

  async function deleteComment(id) {
    await sb.from('comments').delete().eq('id', id)
    loadComments()
  }

  init()
</script>
</body>
</html>
